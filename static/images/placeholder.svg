<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300" role="img" aria-label="Image not available">
  <title>Image not available</title>
  <!-- Background -->
  <rect width="400" height="300" fill="#f0f0f0" rx="8" ry="8"/>
  <!-- Border -->
  <rect x="1" y="1" width="398" height="298" fill="none" stroke="#d0d0d0" stroke-width="2" rx="8" ry="8"/>
  <!-- Camera body -->
  <rect x="155" y="110" width="90" height="70" fill="none" stroke="#aaaaaa" stroke-width="3" rx="6" ry="6"/>
  <!-- Camera lens (outer circle) -->
  <circle cx="200" cy="145" r="22" fill="none" stroke="#aaaaaa" stroke-width="3"/>
  <!-- Camera lens (inner circle) -->
  <circle cx="200" cy="145" r="12" fill="#cccccc"/>
  <!-- Camera viewfinder bump -->
  <rect x="170" y="103" width="20" height="10" fill="none" stroke="#aaaaaa" stroke-width="3" rx="3" ry="3"/>
  <!-- Camera flash dot -->
  <circle cx="232" cy="118" r="4" fill="#aaaaaa"/>
  <!-- "Image not available" text -->
  <text
    x="200"
    y="210"
    font-family="Arial, Helvetica, sans-serif"
    font-size="14"
    fill="#888888"
    text-anchor="middle"
    dominant-baseline="middle"
  >Image not available</text>
</svg>
