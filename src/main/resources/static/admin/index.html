<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — TAMILARASU ENTERPRISES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .stat-card:nth-child(1)::before { background: var(--primary-gradient); }
    .stat-card:nth-child(2)::before { background: linear-gradient(135deg, #e8820c, #c96a08); }
    .stat-card:nth-child(3)::before { background: linear-gradient(135deg, #c0392b, #a93226); }
    .stat-card:nth-child(4)::before { background: linear-gradient(135deg, #d4a017, #b8860b); }
    .stat-card:nth-child(2) .stat-value { color: var(--accent); }
    .stat-card:nth-child(3) .stat-value { color: var(--danger); }
    .stat-card:nth-child(4) .stat-value { color: var(--warning); }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/admin/index.html" class="navbar-brand">🏢 TE Admin</a>
    <div class="nav-menu" id="nav-menu">
      <a href="/index.html">← Store</a>
      <span id="admin-user" style="color:rgba(255,255,255,0.8);font-size:0.85rem"></span>
      <a href="#" onclick="logout()">Logout</a>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="admin-layout">
  <!-- Sidebar -->
  <nav class="admin-sidebar">
    <a href="/admin/index.html" class="active">📊 Dashboard</a>
    <a href="/admin/products.html">📦 Products</a>
    <a href="/admin/inventory.html">🏭 Inventory</a>
    <a href="/admin/orders.html">📋 Orders</a>
    <a href="/admin/reports.html">📈 Reports</a>
  </nav>

  <!-- Content -->
  <div class="admin-content">
    <h2 class="mb-3">Dashboard</h2>

    <div class="grid grid-4 gap-2 mb-4" id="stat-cards">
      <div class="stat-card"><div class="stat-value" id="stat-orders">—</div><div class="stat-label">Total Orders</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-sales">—</div><div class="stat-label">Total Sales</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-low-stock">—</div><div class="stat-label">Low Stock Items</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-pending">—</div><div class="stat-label">Pending Orders</div></div>
    </div>

    <div class="grid grid-2 gap-2">
      <div class="card">
        <div class="card-header">Recent Orders</div>
        <div class="card-body" id="recent-orders">
          <div class="spinner"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">Low Stock Alert</div>
        <div class="card-body" id="low-stock-list">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="/js/api.js"></script>
<script>
  document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('nav-menu').classList.toggle('open');
  });

  async function checkAdmin() {
    try {
      const user = await window.api.get('/api/auth/me');
      if (user.role !== 'ADMIN') {
        window.location.href = '/index.html';
        return null;
      }
      document.getElementById('admin-user').textContent = user.name;
      return user;
    } catch {
      window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
      return null;
    }
  }

  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = '/login.html';
  }

  async function loadDashboard() {
    try {
      // Load orders
      const orders = await window.api.get('/admin/orders');
      document.getElementById('stat-orders').textContent = orders.length;

      const totalSales = orders.reduce((sum, o) => sum + Number(o.total), 0);
      document.getElementById('stat-sales').textContent = '₹' + totalSales.toFixed(0);

      const pending = orders.filter(o => o.status === 'PENDING').length;
      document.getElementById('stat-pending').textContent = pending;

      // Recent orders
      const recentHtml = orders.slice(0, 5).map(o => `
        <div class="flex justify-between mb-2" style="font-size:0.85rem">
          <span>${o.orderNumber}</span>
          <span class="badge status-${o.status}">${o.status}</span>
          <span>₹${Number(o.total).toFixed(2)}</span>
        </div>
      `).join('') || '<p class="text-muted">No orders yet.</p>';
      document.getElementById('recent-orders').innerHTML = recentHtml;

    } catch (e) {
      document.getElementById('recent-orders').innerHTML = `<p class="text-danger">Failed to load: ${e.message}</p>`;
    }

    try {
      // Low stock
      const lowStock = await window.api.get('/admin/inventory/low-stock');
      document.getElementById('stat-low-stock').textContent = lowStock.length;

      const lowStockHtml = lowStock.slice(0, 5).map(p => `
        <div class="flex justify-between mb-2" style="font-size:0.85rem">
          <span>${p.productName}</span>
          <span class="badge ${p.outOfStock ? 'badge-danger' : 'badge-warning'}">${p.quantity} left</span>
        </div>
      `).join('') || '<p class="text-muted text-success">All products well-stocked!</p>';
      document.getElementById('low-stock-list').innerHTML = lowStockHtml;

    } catch (e) {
      document.getElementById('low-stock-list').innerHTML = `<p class="text-danger">Failed to load: ${e.message}</p>`;
    }
  }

  checkAdmin().then(user => { if (user) loadDashboard(); });
</script>
</body>
</html>
