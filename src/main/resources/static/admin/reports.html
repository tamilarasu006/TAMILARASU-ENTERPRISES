<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — Admin — TAMILARASU ENTERPRISES</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/admin/index.html" class="navbar-brand">TE Admin</a>
    <div class="nav-menu" id="nav-menu">
      <a href="/index.html">Store</a>
      <span id="admin-user" style="color:rgba(255,255,255,0.8);font-size:0.85rem"></span>
      <a href="#" onclick="logout()">Logout</a>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="admin-layout">
  <nav class="admin-sidebar">
    <a href="/admin/index.html">Dashboard</a>
    <a href="/admin/products.html">Products</a>
    <a href="/admin/inventory.html">Inventory</a>
    <a href="/admin/orders.html">Orders</a>
    <a href="/admin/reports.html" class="active">Reports</a>
  </nav>

  <div class="admin-content">
    <h2 class="mb-3">Daily Sales Reports</h2>

    <div class="card mb-3">
      <div class="card-body">
        <p class="text-muted" style="font-size:0.9rem">
          Daily reports are generated automatically at midnight via the Python cron script.
          Reports show total sales, order count, and top-selling products for each day.
        </p>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Report History</div>
      <div id="reports-content">
        <div class="spinner" style="margin:2rem auto"></div>
      </div>
    </div>
  </div>
</div>

<!-- Report Detail Modal -->
<div class="modal-overlay hidden" id="report-modal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <h3 id="modal-report-date">Report Details</h3>
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">X</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="/js/api.js"></script>
<script>
  document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('nav-menu').classList.toggle('open');
  });

  async function checkAdmin() {
    try {
      const user = await window.api.get('/api/auth/me');
      if (user.role !== 'ADMIN') { window.location.href = '/index.html'; return null; }
      document.getElementById('admin-user').textContent = user.name;
      return user;
    } catch { window.location.href = '/login.html'; return null; }
  }

  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = '/login.html';
  }

  async function loadReports() {
    const content = document.getElementById('reports-content');
    try {
      const reports = await window.api.get('/admin/reports').catch(() => []);
      if (!reports || reports.length === 0) {
        content.innerHTML = `
          <div class="card-body">
            <div class="empty-state">
              <div class="empty-icon">📊</div>
              <h3>No reports yet</h3>
              <p>Reports will appear here after the daily cron job runs.</p>
            </div>
          </div>`;
        return;
      }
      content.innerHTML = `
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Total Sales</th>
                <th>Order Count</th>
                <th>Generated At</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              ${reports.map(r => `
                <tr>
                  <td><strong>${r.reportDate}</strong></td>
                  <td>Rs.${Number(r.totalSales).toFixed(2)}</td>
                  <td>${r.orderCount}</td>
                  <td>${new Date(r.generatedAt).toLocaleString()}</td>
                  <td><button class="btn btn-secondary btn-sm" onclick="viewReport(${r.id})">View</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`;
    } catch (e) {
      content.innerHTML = `<div class="card-body text-danger">Failed to load reports: ${e.message}</div>`;
    }
  }

  async function viewReport(reportId) {
    const modal = document.getElementById('report-modal');
    const body = document.getElementById('modal-body');
    modal.classList.remove('hidden');
    body.innerHTML = '<div class="spinner"></div>';

    try {
      const r = await window.api.get(`/admin/reports/${reportId}`);
      document.getElementById('modal-report-date').textContent = `Report: ${r.reportDate}`;

      let topProductsHtml = '';
      if (r.topProducts) {
        const products = typeof r.topProducts === 'string' ? JSON.parse(r.topProducts) : r.topProducts;
        topProductsHtml = `
          <h4 style="margin:1rem 0 0.5rem">Top Products</h4>
          <table>
            <thead><tr><th>Product</th><th>Qty Sold</th><th>Revenue</th></tr></thead>
            <tbody>
              ${products.map(p => `
                <tr>
                  <td>${p.product_name || p.productName}</td>
                  <td>${p.quantity_sold || p.quantitySold}</td>
                  <td>Rs.${Number(p.revenue).toFixed(2)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;
      }

      body.innerHTML = `
        <div class="grid grid-2 gap-2 mb-3">
          <div class="stat-card">
            <div class="stat-value">Rs.${Number(r.totalSales).toFixed(2)}</div>
            <div class="stat-label">Total Sales</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${r.orderCount}</div>
            <div class="stat-label">Orders</div>
          </div>
        </div>
        ${topProductsHtml}`;
    } catch (e) {
      body.innerHTML = `<p class="text-danger">Failed to load report: ${e.message}</p>`;
    }
  }

  function closeModal() {
    document.getElementById('report-modal').classList.add('hidden');
  }

  checkAdmin().then(user => { if (user) loadReports(); });
</script>
</body>
</html>
