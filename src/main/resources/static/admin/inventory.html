<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory — Admin — TAMILARASU ENTERPRISES</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/admin/index.html" class="navbar-brand">🏢 TE Admin</a>
    <div class="nav-menu" id="nav-menu">
      <a href="/index.html">← Store</a>
      <span id="admin-user" style="color:rgba(255,255,255,0.8);font-size:0.85rem"></span>
      <a href="#" onclick="logout()">Logout</a>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="admin-layout">
  <nav class="admin-sidebar">
    <a href="/admin/index.html">📊 Dashboard</a>
    <a href="/admin/products.html">📦 Products</a>
    <a href="/admin/inventory.html" class="active">🏭 Inventory</a>
    <a href="/admin/orders.html">📋 Orders</a>
    <a href="/admin/reports.html">📈 Reports</a>
  </nav>

  <div class="admin-content">
    <h2 class="mb-3">Inventory Management</h2>

    <!-- Low Stock Alert -->
    <div class="card mb-3">
      <div class="card-header" style="background:#fff8e1;color:#856404">
        ⚠️ Low Stock Alert (Quantity &lt; 10)
      </div>
      <div class="card-body" id="low-stock-section">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- All Inventory -->
    <div class="card">
      <div class="card-header">All Inventory</div>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Product ID</th>
              <th>Product Name</th>
              <th>Current Stock</th>
              <th>Status</th>
              <th>Update Stock</th>
            </tr>
          </thead>
          <tbody id="inventory-tbody">
            <tr><td colspan="5" class="text-center"><div class="spinner" style="margin:1rem auto"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="/js/api.js"></script>
<script>
  document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('nav-menu').classList.toggle('open');
  });

  async function checkAdmin() {
    try {
      const user = await window.api.get('/api/auth/me');
      if (user.role !== 'ADMIN') { window.location.href = '/index.html'; return null; }
      document.getElementById('admin-user').textContent = user.name;
      return user;
    } catch { window.location.href = '/login.html'; return null; }
  }

  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = '/login.html';
  }

  async function loadInventory() {
    try {
      // Load low stock
      const lowStock = await window.api.get('/admin/inventory/low-stock');
      const lowStockEl = document.getElementById('low-stock-section');
      if (lowStock.length === 0) {
        lowStockEl.innerHTML = '<p class="text-success">✅ All products are well-stocked!</p>';
      } else {
        lowStockEl.innerHTML = `
          <div class="table-responsive">
            <table>
              <thead><tr><th>Product ID</th><th>Product Name</th><th>Quantity</th><th>Status</th></tr></thead>
              <tbody>
                ${lowStock.map(p => `
                  <tr style="background:${p.outOfStock ? '#fde8e8' : '#fff8e1'}">
                    <td>${p.productId}</td>
                    <td>${p.productName}</td>
                    <td><strong style="color:${p.outOfStock ? 'var(--danger)' : '#856404'}">${p.quantity}</strong></td>
                    <td><span class="badge ${p.outOfStock ? 'badge-danger' : 'badge-warning'}">${p.outOfStock ? 'Out of Stock' : 'Low Stock'}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>`;
      }

      // Load all products for inventory table
      const data = await window.api.get('/api/products?page=0');
      const products = data.content || [];
      const tbody = document.getElementById('inventory-tbody');

      if (products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No products found.</td></tr>';
        return;
      }

      tbody.innerHTML = products.map(p => `
        <tr id="inv-row-${p.id}">
          <td>${p.id}</td>
          <td>${p.name}</td>
          <td id="qty-${p.id}">—</td>
          <td><span class="badge ${p.outOfStock ? 'badge-danger' : 'badge-success'}" id="status-${p.id}">${p.outOfStock ? 'Out of Stock' : 'In Stock'}</span></td>
          <td>
            <div class="flex gap-1 items-center">
              <input type="number" id="new-qty-${p.id}" class="form-control" style="width:80px;min-height:36px" min="0" placeholder="Qty">
              <button class="btn btn-primary btn-sm" onclick="updateStock(${p.id})">Update</button>
            </div>
          </td>
        </tr>
      `).join('');

      // Load actual quantities
      for (const p of products) {
        try {
          const inv = await window.api.get(`/admin/inventory/${p.id}`).catch(() => null);
          // We don't have a GET endpoint per product, so we use the low-stock data
        } catch {}
      }

      // Fill quantities from low stock data
      lowStock.forEach(p => {
        const qtyEl = document.getElementById(`qty-${p.productId}`);
        if (qtyEl) qtyEl.textContent = p.quantity;
      });

    } catch (e) {
      document.getElementById('inventory-tbody').innerHTML = `<tr><td colspan="5" class="text-danger">Failed to load: ${e.message}</td></tr>`;
    }
  }

  async function updateStock(productId) {
    const input = document.getElementById(`new-qty-${productId}`);
    const qty = parseInt(input.value);
    if (isNaN(qty) || qty < 0) {
      showToast('Please enter a valid quantity (0 or more)', 'error');
      return;
    }
    try {
      await window.api.put(`/admin/inventory/${productId}`, { quantity: qty });
      showToast('Stock updated successfully!', 'success');
      input.value = '';
      loadInventory();
    } catch (e) {
      showToast('Failed to update stock: ' + e.message, 'error');
    }
  }

  function showToast(message, type) {
    let container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `<span class="toast-message">${message}</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  checkAdmin().then(user => { if (user) loadInventory(); });
</script>
</body>
</html>
