<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TAMILARASU ENTERPRISES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: linear-gradient(135deg, #edf7f0 0%, #faf7f2 50%, #f5ede0 100%); min-height: 100vh; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">🏢</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your TAMILARASU account</p>
    </div>
    <div class="auth-body">
      <div id="error-alert" class="alert alert-danger hidden"><span>⚠️</span><span id="error-msg"></span></div>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
          <div class="invalid-feedback" id="email-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="toggle-pw" onclick="togglePw('password',this)" aria-label="Show password">👁</button>
          </div>
          <div class="invalid-feedback" id="password-error"></div>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" id="submit-btn">Sign In →</button>
      </form>
    </div>
    <div class="auth-footer">
      Don't have an account? <a href="/register.html">Create one here</a>
      &nbsp;·&nbsp; <a href="/index.html">Back to Store</a>
    </div>
  </div>
</div>
<script>
  window.api = {
    get: async (url) => {
      const res = await fetch(url, { credentials: 'include' });
      if (!res.ok) { const err = new Error('HTTP ' + res.status); err.status = res.status; throw err; }
      return res.json();
    }
  };

  // Redirect if already logged in
  (async () => {
    try {
      const user = await window.api.get('/api/auth/me');
      const redirect = new URLSearchParams(window.location.search).get('redirect');
      window.location.href = redirect || (user.role === 'ADMIN' ? '/admin/index.html' : '/index.html');
    } catch {}
  })();

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('error-alert');
    const btn = document.getElementById('submit-btn');

    errorEl.classList.add('hidden');
    document.querySelectorAll('.form-control').forEach(f => f.classList.remove('is-invalid'));

    let valid = true;
    if (!email) {
      document.getElementById('email').classList.add('is-invalid');
      document.getElementById('email-error').textContent = 'Email is required';
      document.getElementById('email-error').style.display = 'block';
      valid = false;
    }
    if (!password) {
      document.getElementById('password').classList.add('is-invalid');
      document.getElementById('password-error').textContent = 'Password is required';
      document.getElementById('password-error').style.display = 'block';
      valid = false;
    }
    if (!valid) return;

    btn.disabled = true; btn.textContent = 'Signing in...';

    try {
      const formData = new URLSearchParams();
      formData.append('email', email);
      formData.append('password', password);
      const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData.toString(),
        credentials: 'include'
      });
      if (response.ok) {
        const data = await response.json();
        const redirect = new URLSearchParams(window.location.search).get('redirect');
        window.location.href = redirect || (data.role === 'ADMIN' ? '/admin/index.html' : '/index.html');
      } else {
        const data = await response.json().catch(() => ({}));
        document.getElementById('error-msg').textContent = response.status === 423
          ? 'Account locked due to too many failed attempts. Try again after 30 minutes.'
          : (data.error || 'Invalid email or password.');
        errorEl.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Sign In →';
      }
    } catch {
      document.getElementById('error-msg').textContent = 'Login failed. Check your connection and try again.';
      errorEl.classList.remove('hidden');
      btn.disabled = false; btn.textContent = 'Sign In →';
    }
  });

  function togglePw(id, btn) {
    const input = document.getElementById(id);
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.textContent = show ? '🙈' : '👁';
  }
</script>
</body>
</html>
