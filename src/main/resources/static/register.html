<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — TAMILARASU ENTERPRISES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: linear-gradient(135deg, #edf7f0 0%, #faf7f2 50%, #f5ede0 100%); min-height: 100vh; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">🏢</div>
      <h1>Create Account</h1>
      <p>Join TAMILARASU ENTERPRISES today</p>
    </div>
    <div class="auth-body">
      <div id="error-alert" class="alert alert-danger hidden"><span>⚠️</span><span id="error-msg"></span></div>
      <div id="success-alert" class="alert alert-success hidden"><span>✅</span><span id="success-msg"></span></div>
      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="Enter your full name" required autocomplete="name">
          <div class="invalid-feedback" id="name-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
          <div class="invalid-feedback" id="email-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Phone <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
          <input type="tel" id="phone" class="form-control" placeholder="+91 XXXXX XXXXX" autocomplete="tel">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" class="form-control" placeholder="Min 8 chars with letters &amp; numbers" required autocomplete="new-password">
            <button type="button" class="toggle-pw" onclick="togglePw('password',this)" aria-label="Show password">👁</button>
          </div>
          <div class="invalid-feedback" id="password-error"></div>
          <div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.35rem">At least 8 characters with letters and numbers</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <div class="password-wrap">
            <input type="password" id="confirm-password" class="form-control" placeholder="Re-enter your password" required autocomplete="new-password">
            <button type="button" class="toggle-pw" onclick="togglePw('confirm-password',this)" aria-label="Show password">👁</button>
          </div>
          <div class="invalid-feedback" id="confirm-password-error"></div>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" id="submit-btn">Create Account →</button>
      </form>
    </div>
    <div class="auth-footer">
      Already have an account? <a href="/login.html">Sign in here</a>
      &nbsp;·&nbsp; <a href="/index.html">Back to Store</a>
    </div>
  </div>
</div>
<script>
  window.api = {
    post: async (url, body) => {
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(body) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { const err = new Error(data.error || 'HTTP ' + res.status); err.status = res.status; err.data = data; throw err; }
      return data;
    }
  };
  function showError(id, msg) {
    const f = document.getElementById(id); const e = document.getElementById(id + '-error');
    if (f) f.classList.add('is-invalid');
    if (e) { e.textContent = msg; e.style.display = 'block'; }
  }
  function clearErrors() {
    document.querySelectorAll('.form-control').forEach(f => f.classList.remove('is-invalid'));
    document.querySelectorAll('.invalid-feedback').forEach(e => { e.textContent = ''; e.style.display = 'none'; });
    document.getElementById('error-alert').classList.add('hidden');
  }
  function validate() {
    clearErrors(); let ok = true;
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const pw = document.getElementById('password').value;
    const cpw = document.getElementById('confirm-password').value;
    if (!name) { showError('name', 'Full name is required'); ok = false; }
    if (!email) { showError('email', 'Email is required'); ok = false; }
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('email', 'Enter a valid email'); ok = false; }
    if (!pw) { showError('password', 'Password is required'); ok = false; }
    else if (pw.length < 8) { showError('password', 'At least 8 characters required'); ok = false; }
    else if (!/(?=.*[a-zA-Z])(?=.*\d)/.test(pw)) { showError('password', 'Must contain letters and numbers'); ok = false; }
    if (!cpw) { showError('confirm-password', 'Please confirm your password'); ok = false; }
    else if (pw !== cpw) { showError('confirm-password', 'Passwords do not match'); ok = false; }
    return ok;
  }
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!validate()) return;
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Creating account...';
    try {
      await window.api.post('/api/auth/register', {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        password: document.getElementById('password').value
      });
      document.getElementById('success-msg').textContent = 'Account created! Redirecting to login...';
      document.getElementById('success-alert').classList.remove('hidden');
      document.getElementById('register-form').style.opacity = '0.5';
      setTimeout(() => { window.location.href = '/login.html'; }, 2000);
    } catch (err) {
      const msg = err.status === 409 ? 'This email is already registered.' : (err.message || 'Registration failed.');
      if (err.data?.details) Object.entries(err.data.details).forEach(([f, m]) => showError(f, m));
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-alert').classList.remove('hidden');
      btn.disabled = false; btn.textContent = 'Create Account →';
    }
  });

  function togglePw(id, btn) {
    const input = document.getElementById(id);
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.textContent = show ? '🙈' : '👁';
  }
</script>
</body>
</html>
