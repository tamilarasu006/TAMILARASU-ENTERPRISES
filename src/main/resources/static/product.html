<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — TAMILARASU ENTERPRISES</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .product-gallery { display: grid; grid-template-columns: 80px 1fr; gap: 1rem; }
    .thumbnails { display: flex; flex-direction: column; gap: 0.5rem; }
    .thumbnail { width: 70px; height: 70px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
    .thumbnail.active { border-color: var(--primary); }
    .main-image { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: var(--radius); background: var(--bg); }
    .product-detail-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
    @media (max-width: 768px) {
      .product-detail-layout { grid-template-columns: 1fr; }
      .product-gallery { grid-template-columns: 1fr; }
      .thumbnails { flex-direction: row; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/index.html" class="navbar-brand">🏢 TAMILARASU ENTERPRISES</a>
    <div class="navbar-search">
      <input type="text" id="search-input" placeholder="Search products..." autocomplete="off">
      <button class="search-btn" onclick="doSearch()">🔍</button>
    </div>
    <div class="nav-menu" id="nav-menu">
      <a href="/catalog.html">Catalog</a>
      <a href="/cart.html" style="position:relative">🛒 Cart <span class="cart-badge" id="cart-badge" style="display:none">0</span></a>
      <span id="auth-links"><a href="/login.html">Login</a> <a href="/register.html" class="btn btn-accent btn-sm">Register</a></span>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="container mt-3 mb-4">
  <nav style="font-size:0.85rem;margin-bottom:1rem">
    <a href="/index.html">Home</a> › <a href="/catalog.html">Catalog</a> › <span id="breadcrumb-name">Product</span>
  </nav>

  <div id="product-container">
    <div class="spinner"></div>
  </div>
</div>

<footer>
  <div class="footer-grid">
    <div class="footer-col"><h4>TAMILARASU ENTERPRISES</h4></div>
    <div class="footer-col"><h4>Quick Links</h4><a href="/index.html">Home</a><a href="/catalog.html">Products</a></div>
  </div>
  <div class="footer-bottom"><p>&copy; 2024 TAMILARASU ENTERPRISES. All rights reserved.</p></div>
</footer>

<div id="toast-container" class="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/cart.js"></script>
<script>
  document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('nav-menu').classList.toggle('open');
  });

  function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (q) window.location.href = `/catalog.html?q=${encodeURIComponent(q)}`;
  }
  document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');

  async function loadProduct() {
    const container = document.getElementById('product-container');
    if (!productId) {
      container.innerHTML = '<p class="text-danger">No product ID specified.</p>';
      return;
    }

    try {
      const p = await window.api.get(`/api/products/${productId}`);
      document.title = `${p.name} — TAMILARASU ENTERPRISES`;
      document.getElementById('breadcrumb-name').textContent = p.name;

      const images = p.images && p.images.length > 0 ? p.images : [];
      const mainImg = images[0] || null;

      const thumbnailsHtml = images.length > 1
        ? images.map((url, i) =>
            `<img src="${url}" alt="Image ${i+1}" class="thumbnail ${i===0?'active':''}" onclick="setMainImage('${url}', this)">`
          ).join('')
        : '';

      const galleryHtml = `
        <div class="product-gallery">
          ${images.length > 1 ? `<div class="thumbnails">${thumbnailsHtml}</div>` : ''}
          <div>
            ${mainImg
              ? `<img src="${mainImg}" alt="${p.name}" class="main-image" id="main-image">`
              : `<div class="main-image" style="display:flex;align-items:center;justify-content:center;font-size:4rem">📦</div>`
            }
          </div>
        </div>`;

      const stockBadge = p.outOfStock
        ? `<span class="badge badge-danger" style="font-size:0.9rem">Out of Stock</span>`
        : `<span class="badge badge-success" style="font-size:0.9rem">In Stock (${p.quantity} available)</span>`;

      const addBtn = p.outOfStock
        ? `<button class="btn btn-secondary btn-lg w-full" disabled>Out of Stock</button>`
        : `<button class="btn btn-accent btn-lg w-full" onclick="addToCart(${p.id})">🛒 Add to Cart</button>`;

      container.innerHTML = `
        <div class="product-detail-layout">
          <div>${galleryHtml}</div>
          <div>
            <div class="text-muted mb-1" style="font-size:0.85rem">${p.categoryName || ''}</div>
            <h1 style="font-size:1.75rem;margin-bottom:0.5rem">${p.name}</h1>
            <div style="font-size:2rem;font-weight:700;color:var(--primary);margin-bottom:1rem">₹${Number(p.price).toFixed(2)}</div>
            <div class="mb-3">${stockBadge}</div>
            <div class="mb-3">${addBtn}</div>
            <a href="/cart.html" class="btn btn-outline w-full">View Cart</a>
            <hr style="margin:1.5rem 0">
            <h3 style="margin-bottom:0.75rem">Description</h3>
            <p style="line-height:1.8;color:var(--text)">${p.description || 'No description available.'}</p>
            <p class="text-muted mt-3" style="font-size:0.8rem">Added: ${new Date(p.createdAt).toLocaleDateString()}</p>
          </div>
        </div>`;
    } catch (e) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">😕</div><h3>Product not found</h3><a href="/catalog.html" class="btn btn-primary mt-2">Back to Catalog</a></div>`;
    }
  }

  function setMainImage(url, el) {
    document.getElementById('main-image').src = url;
    document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  async function addToCart(productId) {
    await window.cartApi.addToCart(productId);
  }

  async function checkAuth() {
    try {
      const user = await window.api.get('/api/auth/me');
      document.getElementById('auth-links').innerHTML = `
        <span style="color:rgba(255,255,255,0.8);font-size:0.85rem">Hi, ${user.name}</span>
        <a href="/orders.html">Orders</a>
        <a href="#" onclick="logout()">Logout</a>
      `;
    } catch {}
  }

  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = '/index.html';
  }

  checkAuth();
  loadProduct();
</script>
</body>
</html>
