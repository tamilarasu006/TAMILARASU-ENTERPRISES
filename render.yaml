services:
  - type: web
    name: tamilarasu-enterprises
    runtime: python
    buildCommand: "pip install --no-cache-dir flask==3.1.1 werkzeug==3.1.3 gunicorn==21.2.0 && pip install --no-cache-dir -r requirements.txt"
    startCommand: "gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
    autoDeploy: true
