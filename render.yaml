services:
  - type: web
    name: tamilarasu-enterprises
    runtime: python
    buildCommand: "pip install --upgrade pip && pip install flask==3.1.1 werkzeug==3.1.3 gunicorn==21.2.0"
    startCommand: "python -m gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
    autoDeploy: true
