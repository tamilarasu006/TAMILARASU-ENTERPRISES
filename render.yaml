services:
  - type: web
    name: tamilarasu-enterprises
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: tamilarasu-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: tamilarasu-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tamilarasu-db
          property: password
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: PORT
        value: "8081"

databases:
  - name: tamilarasu-db
    databaseName: tamilarasu_enterprises
    user: tamilarasu
    plan: free
